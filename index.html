<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Online Bookstore</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

nav{
background:#2563eb;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.menu{
display:flex;
gap:15px;
}

.counter{
background:white;
color:#2563eb;
padding:5px 10px;
border-radius:20px;
font-weight:bold;
}

.hero{
background:#1e40af;
color:white;
text-align:center;
padding:60px;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
border-radius:6px;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
overflow:hidden;
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.price{
color:#2563eb;
font-weight:bold;
}

button{
padding:8px;
margin-top:5px;
border:none;
border-radius:4px;
cursor:pointer;
width:100%;
}

.cart{
background:#2563eb;
color:white;
}

.wish{
background:#e11d48;
color:white;
}

.details{
background:black;
color:white;
}

#detailsPage,#loginPage{
display:none;
padding:30px;
}

.details-box{
display:flex;
gap:30px;
flex-wrap:wrap;
}

.details-box img{
width:300px;
}

footer{
margin-top:40px;
background:#111;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<nav>

<h2>📚 Bookstore</h2>

<div class="menu">

<div class="counter">🛒 <span id="cart">0</span></div>
<div class="counter">❤️ <span id="wish">0</span></div>

<button onclick="openLogin()">Login</button>

</div>

</nav>

<section class="hero" id="home">

<h1>Welcome to Online Bookstore</h1>
<p>Discover your favorite books</p>

</section>

<div class="container" id="bookPage">

<h2>Books</h2>

<div class="grid" id="books"></div>

</div>

<!-- BOOK DETAILS -->

<div id="detailsPage">

<button onclick="goHome()">⬅ Back</button>

<div class="details-box">

<img id="dimg">

<div>

<h2 id="dtitle"></h2>
<p id="dauthor"></p>
<p id="ddesc"></p>
<p class="price" id="dprice"></p>

<button class="cart" onclick="addCart()">Add Cart</button>
<button class="wish" onclick="addWish()">Wishlist</button>

</div>

</div>

</div>

<!-- LOGIN -->

<div id="loginPage">

<h2>Login</h2>

<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<footer>

<p>© 2026 Online Bookstore</p>

</footer>

<script>

let cart=0
let wish=0

const books=[

{t:"Atomic Habits",a:"James Clear",p:16,img:"https://covers.openlibrary.org/b/id/11153221-L.jpg",d:"Guide to good habits"},
{t:"Dune",a:"Frank Herbert",p:12,img:"https://covers.openlibrary.org/b/id/8108696-L.jpg",d:"Sci-fi classic"},
{t:"Sapiens",a:"Yuval Noah Harari",p:20,img:"https://covers.openlibrary.org/b/id/8167896-L.jpg",d:"Human history"},
{t:"Educated",a:"Tara Westover",p:15,img:"https://covers.openlibrary.org/b/id/8370221-L.jpg",d:"Memoir"},
{t:"The Alchemist",a:"Paulo Coelho",p:10,img:"https://covers.openlibrary.org/b/id/8271996-L.jpg",d:"Dream journey"},
{t:"Rich Dad Poor Dad",a:"Robert Kiyosaki",p:13,img:"https://covers.openlibrary.org/b/id/7222246-L.jpg",d:"Finance book"},
{t:"Ikigai",a:"Hector Garcia",p:14,img:"https://covers.openlibrary.org/b/id/9259256-L.jpg",d:"Japanese life secret"},
{t:"Deep Work",a:"Cal Newport",p:15,img:"https://covers.openlibrary.org/b/id/8375046-L.jpg",d:"Focus skills"},
{t:"Harry Potter",a:"J.K Rowling",p:18,img:"https://covers.openlibrary.org/b/id/7984916-L.jpg",d:"Magic adventure"},
{t:"Think and Grow Rich",a:"Napoleon Hill",p:11,img:"https://covers.openlibrary.org/b/id/8231856-L.jpg",d:"Success book"},
{t:"1984",a:"George Orwell",p:9,img:"https://covers.openlibrary.org/b/id/7222246-L.jpg",d:"Dystopian novel"},
{t:"The Hobbit",a:"J.R.R Tolkien",p:14,img:"https://covers.openlibrary.org/b/id/6979861-L.jpg",d:"Fantasy adventure"},
{t:"The Power of Now",a:"Eckhart Tolle",p:16,img:"https://covers.openlibrary.org/b/id/240726-L.jpg",d:"Spiritual guide"},
{t:"Start With Why",a:"Simon Sinek",p:17,img:"https://covers.openlibrary.org/b/id/9251996-L.jpg",d:"Leadership book"},
{t:"Zero to One",a:"Peter Thiel",p:18,img:"https://covers.openlibrary.org/b/id/8235116-L.jpg",d:"Startup mindset"}

]

function render(){

const box=document.getElementById("books")

books.forEach((b,i)=>{

box.innerHTML+=`

<div class="card">

<img src="${b.img}">

<div class="card-body">

<h3>${b.t}</h3>
<p>${b.a}</p>
<p class="price">$${b.p}</p>

<button class="details" onclick="details(${i})">Details</button>
<button class="cart" onclick="addCart()">Add Cart</button>
<button class="wish" onclick="addWish()">Wishlist</button>

</div>

</div>

`

})

}

function addCart(){
cart++
document.getElementById("cart").innerText=cart
}

function addWish(){
wish++
document.getElementById("wish").innerText=wish
}

function details(i){

const b=books[i]

document.getElementById("home").style.display="none"
document.getElementById("bookPage").style.display="none"
document.getElementById("detailsPage").style.display="block"

dimg.src=b.img
dtitle.innerText=b.t
dauthor.innerText=b.a
ddesc.innerText=b.d
dprice.innerText="$"+b.p

}

function goHome(){

detailsPage.style.display="none"
home.style.display="block"
bookPage.style.display="block"

}

function openLogin(){

home.style.display="none"
bookPage.style.display="none"
loginPage.style.display="block"

}

function login(){

let e=email.value
let p=pass.value

if(e=="user@bookstore.com" && p=="123456"){

msg.innerText="Login successful"

setTimeout(()=>{
loginPage.style.display="none"
home.style.display="block"
bookPage.style.display="block"
},1000)

}else{

msg.innerText="Invalid login"

}

}

render()

</script>

</body>
</html>
